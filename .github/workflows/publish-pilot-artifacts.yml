name: publish-pilot-artifacts

on:
  workflow_dispatch:
  push:
    branches:
      - pilot

jobs:
  publish:
    permissions:
      contents: write
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            apple_signing_identity: "-"
          - platform: windows-2022
            args: --bundles nsis
            apple_signing_identity: ""
    runs-on: ${{ matrix.platform }}
    env:
      APPLE_SIGNING_IDENTITY: ${{ matrix.apple_signing_identity }}
      VITE_CHECKOUT_MONTHLY_URL: ${{ vars.VITE_CHECKOUT_MONTHLY_URL }}
      VITE_CHECKOUT_YEARLY_URL: ${{ vars.VITE_CHECKOUT_YEARLY_URL }}
      VITE_CHECKOUT_LIFETIME_URL: ${{ vars.VITE_CHECKOUT_LIFETIME_URL }}
      AGENTSHIELD_LICENSE_GATEWAY_URL: ${{ vars.AGENTSHIELD_LICENSE_GATEWAY_URL }}
      AGENTSHIELD_LICENSE_PUBLIC_KEY: ${{ vars.AGENTSHIELD_LICENSE_PUBLIC_KEY }}
      LICENSE_DELIVERY_FROM_EMAIL: ${{ vars.LICENSE_DELIVERY_FROM_EMAIL }}
      LICENSE_DELIVERY_REPLY_TO: ${{ vars.LICENSE_DELIVERY_REPLY_TO }}
      CREEM_SKU_BILLING_MAP_JSON: ${{ vars.CREEM_SKU_BILLING_MAP_JSON }}
      CREEM_PRODUCT_BILLING_MAP_JSON: ${{ vars.CREEM_PRODUCT_BILLING_MAP_JSON }}
      LICENSE_GATEWAY_DATA_PATH: .tmp/license-gateway.json
      CREEM_WEBHOOK_SECRET: ${{ secrets.CREEM_WEBHOOK_SECRET }}
      LICENSE_GATEWAY_ADMIN_PASSWORD: ${{ secrets.LICENSE_GATEWAY_ADMIN_PASSWORD }}
      AGENTSHIELD_LICENSE_SIGNING_SEED: ${{ secrets.AGENTSHIELD_LICENSE_SIGNING_SEED }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium

      - name: Pilot public-sale gate
        run: pnpm run release:github:ready

      - name: Build GitHub pilot artifacts
        uses: tauri-apps/tauri-action@v0.6.2
        with:
          projectPath: .
          tauriScript: pnpm tauri
          tagName: agentshield-pilot-v__VERSION__
          releaseName: AgentShield Pilot v__VERSION__
          releaseBody: |
            AgentShield Pilot release artifacts.

            Downloads:
            - macOS: Apple Silicon DMG
            - Windows: x64 NSIS installer

            Commercial path:
            - 14-day trial in app
            - Activation-code upgrade
            - Online verification only when a stable public license gateway is configured
          releaseDraft: true
          prerelease: false
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload pilot workflow artifacts
        uses: actions/upload-artifact@v6
        with:
          name: agentshield-pilot-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/
            src-tauri/target/aarch64-apple-darwin/release/bundle/
          if-no-files-found: error
