name: publish-signed-release

on:
  workflow_dispatch:
  push:
    branches:
      - release

jobs:
  publish:
    permissions:
      contents: write
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin --config src-tauri/tauri.release.json
          - platform: windows-2022
            args: --config src-tauri/tauri.release.json
    runs-on: ${{ matrix.platform }}
    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      VITE_CHECKOUT_MONTHLY_URL: ${{ vars.VITE_CHECKOUT_MONTHLY_URL }}
      VITE_CHECKOUT_YEARLY_URL: ${{ vars.VITE_CHECKOUT_YEARLY_URL }}
      VITE_CHECKOUT_LIFETIME_URL: ${{ vars.VITE_CHECKOUT_LIFETIME_URL }}
      AGENTSHIELD_LICENSE_GATEWAY_URL: ${{ vars.AGENTSHIELD_LICENSE_GATEWAY_URL }}
      AGENTSHIELD_LICENSE_PUBLIC_KEY: ${{ vars.AGENTSHIELD_LICENSE_PUBLIC_KEY }}
      LICENSE_DELIVERY_FROM_EMAIL: ${{ vars.LICENSE_DELIVERY_FROM_EMAIL }}
      LICENSE_DELIVERY_REPLY_TO: ${{ vars.LICENSE_DELIVERY_REPLY_TO }}
      LICENSE_GATEWAY_DATA_PATH: .tmp/license-gateway.json
      LEMONSQUEEZY_WEBHOOK_SECRET: ${{ secrets.LEMONSQUEEZY_WEBHOOK_SECRET }}
      LICENSE_GATEWAY_ADMIN_PASSWORD: ${{ secrets.LICENSE_GATEWAY_ADMIN_PASSWORD }}
      AGENTSHIELD_LICENSE_SIGNING_SEED: ${{ secrets.AGENTSHIELD_LICENSE_SIGNING_SEED }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      TAURI_UPDATER_PUBLIC_KEY: ${{ secrets.TAURI_UPDATER_PUBLIC_KEY }}
      TAURI_UPDATER_ENDPOINT: ${{ vars.TAURI_UPDATER_ENDPOINT }}
      WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.WINDOWS_CERTIFICATE_THUMBPRINT }}
      WINDOWS_TIMESTAMP_URL: ${{ vars.WINDOWS_TIMESTAMP_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium

      - name: Diagnose VBSCRIPT for MSI bundling
        if: startsWith(matrix.platform, 'windows-')
        shell: pwsh
        run: |
          $feature = Get-WindowsOptionalFeature -Online -FeatureName VBSCRIPT -ErrorAction SilentlyContinue
          if ($null -ne $feature) {
            Write-Host "VBSCRIPT optional feature state: $($feature.State)"
            if ($feature.State -ne 'Enabled') {
              try {
                $result = Enable-WindowsOptionalFeature -Online -FeatureName VBSCRIPT -All -NoRestart -ErrorAction Stop
                if ($result.RestartNeeded) {
                  Write-Warning "VBSCRIPT requested a restart after enablement."
                }
              } catch {
                Write-Warning "Failed to enable VBSCRIPT optional feature automatically: $($_.Exception.Message)"
              }
            }
            $verified = Get-WindowsOptionalFeature -Online -FeatureName VBSCRIPT
            if ($verified.State -eq 'Enabled') {
              Write-Host "VBSCRIPT optional feature is enabled."
              exit 0
            }
            Write-Warning "VBSCRIPT optional feature exists but is not enabled. MSI bundling may still fail with light.exe."
            exit 0
          }

          $capability = Get-WindowsCapability -Online | Where-Object { $_.Name -like 'VBSCRIPT*' } | Select-Object -First 1
          if ($null -eq $capability) {
            Write-Host "No VBSCRIPT optional feature or capability is exposed on this runner. Continuing."
            exit 0
          }

          Write-Host "VBSCRIPT capability state: $($capability.State) ($($capability.Name))"
          if ($capability.State -ne 'Installed') {
            try {
              Add-WindowsCapability -Online -Name $capability.Name -ErrorAction Stop | Out-Host
            } catch {
              Write-Warning "Failed to install VBSCRIPT capability automatically: $($_.Exception.Message)"
            }
          }

          $verifiedCapability = Get-WindowsCapability -Online | Where-Object { $_.Name -eq $capability.Name } | Select-Object -First 1
          if ($null -ne $verifiedCapability -and $verifiedCapability.State -eq 'Installed') {
            Write-Host "VBSCRIPT capability is installed."
            exit 0
          }
          Write-Warning "VBSCRIPT capability exists but is not installed. MSI bundling may still fail with light.exe."

      - name: Import Windows certificate
        if: startsWith(matrix.platform, 'windows-') && secrets.WINDOWS_CERTIFICATE != '' && secrets.WINDOWS_CERTIFICATE_PASSWORD != ''
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          New-Item -ItemType directory -Force -Path certificate | Out-Null
          Set-Content -Path certificate/tempCert.txt -Value $env:WINDOWS_CERTIFICATE
          certutil -decode certificate/tempCert.txt certificate/certificate.pfx
          Import-PfxCertificate -FilePath certificate/certificate.pfx -CertStoreLocation Cert:\CurrentUser\My -Password (ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText)

      - name: Import Apple certificate
        if: matrix.platform == 'macos-latest' && secrets.APPLE_CERTIFICATE != '' && secrets.APPLE_CERTIFICATE_PASSWORD != '' && secrets.KEYCHAIN_PASSWORD != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain

      - name: Public sale gate
        run: pnpm run release:public:ready

      - name: Render Tauri release config
        run: pnpm run release:render-config

      - name: Build and publish signed release
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: .
          tauriScript: pnpm tauri
          tagName: agentshield-v__VERSION__
          releaseName: AgentShield v__VERSION__
          releaseBody: |
            Signed AgentShield release artifacts.
            See release assets for installers and updater manifests.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
